<!doctype html>
<html dir="rtl" lang="ar">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>تسجيل الدخول — نادي أديب</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />
    <link rel="stylesheet" href="style.css" />
    <style>
      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #0b0b0c;
        color: #fff;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, "Helvetica Neue", Arial, "Noto Sans", "Apple Color Emoji", "Segoe UI Emoji";
      }
      .login-card {
        width: min(520px, 92vw);
        background: #121214;
        border: 1px solid #222;
        border-radius: 14px;
        padding: 28px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.35);
      }
      .login-card header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 18px;
      }
      .login-card header img { width: 42px; height: 42px; border-radius: 8px; object-fit: cover; }
      .login-card h1 { font-size: 1.15rem; margin: 0; }
      .login-card p { color: #bbb; margin: 6px 0 0; font-size: .95rem; }
      form { display: grid; gap: 12px; margin-top: 14px; }
      label { display: grid; gap: 6px; font-size: .95rem; color: #ddd; }
      input[type=email] {
        background: #0f0f11; color: #fff;
        border: 1px solid #2a2a2e; border-radius: 10px; padding: 12px 14px;
      }
      .actions { display: flex; gap: 10px; align-items: center; }
      button.btn-primary {
        display: inline-flex; align-items: center; gap: 8px;
        background: #4f46e5; color: #fff; border: none; border-radius: 10px; padding: 10px 14px; cursor: pointer;
      }
      .muted { color: #9aa; font-size: .9rem; }
      .center { text-align: center; }
      .alert { background:#0d1b0d; border:1px solid #1b3a1b; color:#b5f7b5; padding:10px 12px; border-radius:10px; }
      .error { background:#2a1212; border-color:#612; color:#ffb0b0; }
      .footer-links { display:flex; justify-content: space-between; margin-top: 10px; }
      a { color: #9ecbff; }
    </style>
  </head>
  <body>
    <div class="login-card" role="main">
      <header>
        <img alt="شعار نادي أديب" src="https://lh3.googleusercontent.com/d/195w-tUBF_VKwFOm3Sh06fmwnlYzIyw0e" />
        <div>
          <h1>تسجيل الدخول إلى لوحة التحكم</h1>
          <p>استخدم بريدك الإلكتروني لاستلام رابط الدخول.</p>
        </div>
      </header>

      <div id="status" class="muted"></div>

      <form id="loginForm">
        <label>
          البريد الإلكتروني
          <input id="email" name="email" type="email" inputmode="email" autocomplete="email" required placeholder="name@example.com" />
        </label>
        <div class="actions">
          <button type="submit" class="btn-primary"><i class="fa-solid fa-paper-plane"></i> إرسال رابط الدخول</button>
          <span id="msg" class="muted" aria-live="polite"></span>
        </div>
      </form>

      <div class="footer-links">
        <a href="index.html"><i class="fa-solid fa-globe"></i> الرجوع للموقع</a>
        <span class="muted">إذا لديك حساب مفعّل فقط ستتمكن من الدخول</span>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script>
      (async function() {
        const sb = window.sbClient;
        const msg = document.getElementById('msg');
        const status = document.getElementById('status');
        const form = document.getElementById('loginForm');

        if (!sb) {
          status.className = 'alert error';
          status.textContent = 'Supabase غير مفعّل. تأكد من تحميل المكتبة وإعداد المفاتيح.';
          form.querySelector('button').disabled = true;
          return;
        }

        // If already logged in, redirect to admin (or given redirect)
        try {
          const { data: { session } } = await sb.auth.getSession();
          const params = new URLSearchParams(location.search);
          const redirect = params.get('redirect') || 'admin.html';
          if (session) {
            location.replace(redirect);
            return;
          }
        } catch {}

        form.addEventListener('submit', async (e) => {
          e.preventDefault();
          msg.textContent = '';
          const email = document.getElementById('email').value.trim();
          if (!email) return;
          form.querySelector('button').disabled = true;
          form.querySelector('button').style.opacity = .7;
          try {
            const params = new URLSearchParams(location.search);
            const redirect = params.get('redirect') || 'admin.html';
            const { error } = await sb.auth.signInWithOtp({
              email,
              options: { emailRedirectTo: new URL(redirect, location.origin).href }
            });
            if (error) throw error;
            status.className = 'alert';
            status.textContent = 'تم إرسال رابط الدخول إلى بريدك. افتح الرابط للمتابعة.';
          } catch (err) {
            status.className = 'alert error';
            status.textContent = 'فشل الإرسال: ' + (err?.message || 'حدث خطأ غير متوقع');
          } finally {
            form.querySelector('button').disabled = false;
            form.querySelector('button').style.opacity = 1;
          }
        });
      })();
    </script>
  </body>
</html>
