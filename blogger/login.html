<!doctype html>
<html dir="rtl" lang="ar">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>تسجيل دخول المدونين — نادي أديب</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />
    <link rel="stylesheet" href="../style.css" />
    <style>
      body { min-height: 100vh; display: grid; place-items: center; background: #0b0b0c; color: #fff; font-family: system-ui, -apple-system, Segoe UI, Roboto, "Helvetica Neue", Arial }
      .card { width: min(520px, 92vw); background: #121214; border: 1px solid #222; border-radius: 14px; padding: 28px; box-shadow: 0 10px 30px rgba(0,0,0,.35) }
      header { display: flex; align-items: center; gap: 12px; margin-bottom: 18px }
      header img { width: 42px; height: 42px; border-radius: 8px; object-fit: cover }
      h1 { font-size: 1.15rem; margin: 0 }
      p { color: #bbb; margin: 6px 0 0; font-size: .95rem }
      form { display: grid; gap: 12px; margin-top: 14px }
      label { display: grid; gap: 6px; font-size: .95rem; color: #ddd }
      input[type=email] { background: #0f0f11; color: #fff; border: 1px solid #2a2a2e; border-radius: 10px; padding: 12px 14px }
      .actions { display: flex; gap: 10px; align-items: center }
      button.btn-primary { display: inline-flex; align-items: center; gap: 8px; background: #4f46e5; color: #fff; border: none; border-radius: 10px; padding: 10px 14px; cursor: pointer }
      .muted { color: #9aa; font-size: .9rem }
      .alert { background:#0d1b0d; border:1px solid #1b3a1b; color:#b5f7b5; padding:10px 12px; border-radius:10px }
      .error { background:#2a1212; border-color:#612; color:#ffb0b0 }
      .footer-links { display:flex; justify-content: space-between; margin-top: 10px }
      a { color: #9ecbff }
    </style>
  </head>
  <body>
    <div class="card" role="main">
      <header>
        <img alt="شعار نادي أديب" src="https://lh3.googleusercontent.com/d/195w-tUBF_VKwFOm3Sh06fmwnlYzIyw0e" />
        <div>
          <h1>تسجيل دخول المدونين</h1>
          <p>سجّل الدخول ببريدك وكلمة المرور للوصول إلى لوحة المدونين.</p>
        </div>
      </header>

      <div id="status" class="muted"></div>

      <form id="loginForm">
        <label>
          البريد الإلكتروني
          <input id="email" name="email" type="email" inputmode="email" autocomplete="email" required placeholder="name@example.com" />
        </label>
        <label>
          كلمة المرور
          <input id="password" name="password" type="password" autocomplete="current-password" required placeholder="••••••••" />
        </label>
        <div class="actions">
          <button type="submit" class="btn-primary"><i class="fa-solid fa-right-to-bracket"></i> تسجيل الدخول</button>
          <span id="msg" class="muted" aria-live="polite"></span>
        </div>
      </form>

      <div class="footer-links">
        <a href="../blog/blog.html"><i class="fa-solid fa-anchor"></i> الرجوع للمدونة</a>
        <div style="display:flex; gap:12px">
          <a href="forgot.html"><i class="fa-solid fa-key"></i> نسيت كلمة المرور؟</a>
          <a href="register.html"><i class="fa-solid fa-user-plus"></i> إنشاء حساب مدون</a>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../supabase-config.js"></script>
    <script>
      (async function() {
        const sb = window.sbClient;
        const msg = document.getElementById('msg');
        const status = document.getElementById('status');
        const form = document.getElementById('loginForm');

        if (!sb) {
          status.className = 'alert error';
          status.textContent = 'Supabase غير مفعّل. تأكد من تحميل المكتبة وإعداد المفاتيح.';
          form.querySelector('button').disabled = true;
          return;
        }

        try {
          const { data: { session } } = await sb.auth.getSession();
          if (session) { location.replace('dashboard.html'); return; }
        } catch {}

        form.addEventListener('submit', async (e) => {
          e.preventDefault();
          msg.textContent = '';
          const email = document.getElementById('email').value.trim();
          const password = document.getElementById('password').value;
          if (!email || !password) return;
          const btn = form.querySelector('button'); btn.disabled = true; btn.style.opacity = .7;
          try {
            const { data, error } = await sb.auth.signInWithPassword({ email, password });
            if (error) throw error;
            // Log login activity (best-effort)
            try {
              const { data: u } = await sb.auth.getUser();
              const user = u && u.user ? u.user : (data && data.user ? data.user : null);
              if (user) {
                await sb.from('activity_logs').insert({
                  user_id: user.id,
                  email: user.email,
                  type: 'login',
                });
              }
            } catch (_) {}
            const params = new URLSearchParams(location.search);
            const redirect = params.get('redirect') || 'dashboard.html';
            location.replace(redirect);
          } catch (err) {
            status.className = 'alert error';
            status.textContent = 'فشل تسجيل الدخول: ' + (err?.message || 'تحقق من البيانات');
          } finally {
            btn.disabled = false; btn.style.opacity = 1;
          }
        });
      })();
    </script>
  </body>
</html>
