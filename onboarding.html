<!doctype html>
<html dir="rtl" lang="ar">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>إكمال التسجيل — نادي أديب</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />
    <link rel="stylesheet" href="style.css" />
    <style>
      body { background:#f8fafc }
      .onboarding-card { max-width:600px; margin:40px auto; background:#fff; border:1px solid #e5e7eb; border-radius:12px; padding:20px; box-shadow:0 10px 24px rgba(0,0,0,.06) }
      .onboarding-card h1 { font-size:22px; margin:0 0 8px }
      .onboarding-card p { color:#64748b; line-height:1.7; margin:0 0 16px }
      .form-grid { display:grid; grid-template-columns:1fr; gap:12px }
      .avatar-preview { width:120px; height:120px; border-radius:50%; object-fit:cover; border:1px solid #e5e7eb; background:#f1f5f9 }
      .center { display:flex; gap:12px; align-items:center; }
      .muted { color:#64748b }
      .alert { padding:10px 12px; border-radius:8px; margin-top:10px }
      .alert.error { background:#fee2e2; color:#991b1b; border:1px solid #fecaca }
      .alert.success { background:#dcfce7; color:#166534; border:1px solid #bbf7d0 }
    </style>
  </head>
  <body>
    <div class="onboarding-card" aria-live="polite">
      <div style="text-align:center; font-size:40px; color:#0ea5e9; margin-bottom:6px"><i class="fa-solid fa-user-plus"></i></div>
      <h1 style="text-align:center">إكمال إنشاء الحساب</h1>
      <p style="text-align:center">مرحبًا بك! يرجى إدخال اسمك، وتعيين كلمة المرور. صورة الملف الشخصي اختيارية.</p>

      <div id="status" class="muted" style="text-align:center; margin-bottom:12px"></div>

      <form id="onboardingForm" class="form-grid">
        <label>
          الاسم الكامل
          <input id="fullName" name="fullName" required placeholder="الاسم كما سيظهر في لوحة التحكم" />
        </label>
        <label>
          كلمة المرور
          <input id="password" name="password" type="password" minlength="6" required placeholder="••••••" />
        </label>
        <label>
          صورة الملف الشخصي (اختياري)
          <input id="avatarFile" name="avatar" type="file" accept="image/*" />
        </label>
        <div class="center" style="justify-content:center">
          <img id="avatarPreview" alt="معاينة الصورة" class="avatar-preview" />
        </div>
        <div style="display:flex; gap:8px; justify-content:center; flex-wrap:wrap; margin-top:8px">
          <button type="submit" class="btn btn-primary"><i class="fa-solid fa-check"></i> حفظ ومتابعة</button>
          <a class="btn btn-outline" href="index.html"><i class="fa-solid fa-globe"></i> الرجوع للموقع</a>
        </div>
      </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="onboarding.js"></script>
  </body>
</html>
