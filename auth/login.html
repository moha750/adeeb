<!doctype html>
<html dir="rtl" lang="ar">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>تسجيل الدخول — نادي أديب</title>
    <meta name="robots" content="noindex, nofollow" />
    <meta name="googlebot" content="noindex, nofollow" />
    <link rel="canonical" href="https://www.adeeb.club/login.html" />
    <!-- favicon.io -->
    <link rel="apple-touch-icon" sizes="152x152" href="/favicon/apple-icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-icon-180x180.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon/android-icon-192x192.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon/favicon-96x96.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon/favicon-16x16.png" />
    <link rel="manifest" href="/favicon/manifest.json" />
    <meta name="msapplication-TileColor" content="#ffffff" />
    <meta name="msapplication-TileImage" content="/favicon/ms-icon-144x144.png" />
    <meta name="theme-color" content="#ffffff" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />
    <link rel="stylesheet" href="../admin/css/fonts.css" />
    <link rel="stylesheet" href="../admin/css/design-tokens.css" />
    <link rel="stylesheet" href="../admin/css/inputs-system.css" />
    <link rel="stylesheet" href="../admin/css/buttons-system.css" />
    <link rel="stylesheet" href="auth-identity.css" />
  </head>
  <body>
    <div class="auth-particles" aria-hidden="true">
      <span></span><span></span><span></span><span></span><span></span>
    </div>

    <div class="auth-card" role="main">
      <header class="auth-head">
        <div class="auth-logo">
          <img alt="شعار نادي أديب" src="https://lh3.googleusercontent.com/d/195w-tUBF_VKwFOm3Sh06fmwnlYzIyw0e" />
        </div>
        <h1>تسجيل الدخول إلى لوحة التحكم</h1>
        <p>
          <i class="fa-solid fa-shield-halved"></i>
          تسجيل الدخول خاص لِمُنتسبي وأعضاء نادي أدِيب فقط
        </p>
      </header>

      <div id="status" class="auth-status"></div>

      <form id="loginForm" class="auth-form">
        <div class="form-group">
          <label class="form-label" for="email">
            <span class="label-icon"><i class="fa-solid fa-envelope"></i></span>
            البريد الإلكتروني
          </label>
          <div class="form-input-wrap has-icon-start">
            <span class="form-icon-start"><i class="fa-solid fa-at"></i></span>
            <input id="email" name="email" type="email" inputmode="email" autocomplete="email" required placeholder="name@example.com" class="form-input" />
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">
            <span class="label-icon"><i class="fa-solid fa-lock"></i></span>
            كلمة المرور
          </label>
          <div class="form-input-wrap has-icon-start has-icon-end">
            <span class="form-icon-start"><i class="fa-solid fa-key"></i></span>
            <input id="password" name="password" type="password" autocomplete="current-password" minlength="6" required placeholder="••••••" class="form-input" />
            <span class="form-icon-end clickable" id="togglePassword" role="button" tabindex="0" aria-label="إظهار/إخفاء كلمة المرور">
              <i class="fa-solid fa-eye-slash"></i>
            </span>
          </div>
        </div>

        <div class="auth-forgot">
          <a href="reset-password.html"><i class="fa-solid fa-key"></i> نسيت كلمة المرور؟</a>
        </div>

        <button type="submit" class="btn btn-primary btn-lg btn-block">
          <i class="fa-solid fa-right-to-bracket"></i> تسجيل الدخول
        </button>
      </form>

      <div class="auth-foot">
        <a href="../index.html" class="btn btn-primary btn-outline"><i class="fa-solid fa-globe"></i> الرجوع لموقع أدِيب</a>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../supabase-config.js"></script>
    <script>
      (async function() {
        const sb = window.sbClient;
        const status = document.getElementById('status');
        const form = document.getElementById('loginForm');

        if (!sb) {
          status.className = 'auth-status error';
          status.textContent = 'Supabase غير مفعّل. تأكد من تحميل المكتبة وإعداد المفاتيح.';
          form.querySelector('button').disabled = true;
          return;
        }

        function translateError(error) {
          const message = error?.message || '';
          if (error) console.error('خطأ تسجيل الدخول:', error);
          if (message.includes('Invalid login credentials')) return 'البريد الإلكتروني أو كلمة المرور غير صحيحة';
          if (message.includes('Email not confirmed'))       return 'البريد الإلكتروني غير مفعّل. يرجى تفعيل حسابك أولاً';
          if (message.includes('User not found'))            return 'لا يوجد حساب مسجل بهذا البريد الإلكتروني';
          if (message.includes('Invalid email'))             return 'صيغة البريد الإلكتروني غير صحيحة';
          if (message.includes('Password should be at least'))return 'كلمة المرور يجب أن تكون 6 أحرف على الأقل';
          if (message.includes('Email rate limit exceeded') || message.includes('rate limit')) return 'تم تجاوز عدد المحاولات المسموحة. يرجى الانتظار قليلاً ثم المحاولة مرة أخرى';
          if (message.includes('Network request failed') || message.includes('fetch') || message.includes('Failed to fetch')) return 'خطأ في الاتصال بالإنترنت. تأكد من اتصالك وحاول مرة أخرى';
          if (message.includes('timeout') || message.includes('timed out')) return 'انتهت مهلة الاتصال. يرجى المحاولة مرة أخرى';
          if (message.includes('Too many requests')) return 'عدد كبير من المحاولات. يرجى الانتظار قليلاً';
          if (message.includes('Invalid password'))  return 'كلمة المرور غير صحيحة';
          if (message.includes('Signup not allowed'))return 'التسجيل غير مسموح حالياً';
          return message ? '⚠️ ' + message : '❌ حدث خطأ غير متوقع';
        }

        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');

        function setCustomValidationMessage(input) {
          input.addEventListener('invalid', function(e) {
            e.preventDefault();
            if (this.validity.valueMissing) this.setCustomValidity('⚠️ يرجى ملء هذا الحقل');
            else if (this.validity.typeMismatch && this.type === 'email') this.setCustomValidity('⚠️ يرجى إدخال بريد إلكتروني صحيح');
            else if (this.validity.tooShort) this.setCustomValidity(`⚠️ يجب أن يكون ${this.minLength} أحرف على الأقل`);
            else this.setCustomValidity('⚠️ يرجى التحقق من البيانات المدخلة');
          });
          input.addEventListener('input', function() { this.setCustomValidity(''); });
        }
        setCustomValidationMessage(emailInput);
        setCustomValidationMessage(passwordInput);

        const toggleBtn = document.getElementById('togglePassword');
        function togglePasswordVisibility() {
          const type = passwordInput.type === 'password' ? 'text' : 'password';
          passwordInput.type = type;
          const icon = toggleBtn.querySelector('i');
          icon.classList.toggle('fa-eye-slash', type === 'password');
          icon.classList.toggle('fa-eye', type === 'text');
        }
        toggleBtn.addEventListener('click', togglePasswordVisibility);
        toggleBtn.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); togglePasswordVisibility(); }
        });

        const params = new URLSearchParams(location.search);
        const notice = params.get('notice');
        if (notice === 'not_admin') {
          status.className = 'auth-status error';
          status.textContent = 'حسابك ليس إداريًا. يمكنك استخدام حساب إداري للدخول إلى لوحة التحكم.';
        }

        try {
          const { data: { session } } = await sb.auth.getSession();
          if (session) {
            const params = new URLSearchParams(location.search);
            const redirectParam = params.get('redirect');
            let redirectPath = '/admin/dashboard.html';
            if (redirectParam) {
              try {
                if (/^https?:\/\//i.test(redirectParam)) {
                  const u = new URL(redirectParam);
                  if (u.origin === location.origin) redirectPath = u.href;
                } else {
                  const u = new URL(redirectParam.startsWith('/') ? redirectParam : '/' + redirectParam, location.origin);
                  redirectPath = u.pathname + u.search + u.hash;
                }
              } catch {}
            }
            try {
              const userId = session.user.id;
              const { data: adminRow } = await sb
                .from('admins')
                .select('user_id,is_admin')
                .eq('user_id', userId)
                .eq('is_admin', true)
                .maybeSingle();
              if (adminRow) location.replace(redirectPath);
            } catch {
              location.replace(redirectPath);
            }
          }
        } catch {}

        form.addEventListener('submit', async (e) => {
          e.preventDefault();
          status.className = 'auth-status';
          status.textContent = '';
          const email = document.getElementById('email').value.trim();
          const password = document.getElementById('password').value;
          if (!email || !password) return;
          const submitBtn = form.querySelector('button[type="submit"]');
          submitBtn.disabled = true;
          submitBtn.style.opacity = .7;
          try {
            const params = new URLSearchParams(location.search);
            const redirectParam = params.get('redirect');
            let redirectPath = '/admin/dashboard.html';
            if (redirectParam) {
              try {
                if (/^https?:\/\//i.test(redirectParam)) {
                  const u = new URL(redirectParam);
                  if (u.origin === location.origin) redirectPath = u.href;
                } else {
                  const u = new URL(redirectParam.startsWith('/') ? redirectParam : '/' + redirectParam, location.origin);
                  redirectPath = u.pathname + u.search + u.hash;
                }
              } catch {}
            }
            const { data, error } = await sb.auth.signInWithPassword({ email, password });
            if (error) {
              status.className = 'auth-status error';
              status.textContent = translateError(error);
              return;
            }
            if (data?.user) {
              try {
                const userId = data.user.id;
                const { data: profileRow } = await sb
                  .from('profiles')
                  .select('id,username,full_name,account_status')
                  .eq('id', userId)
                  .maybeSingle();
                if (!profileRow) {
                  status.className = 'auth-status error';
                  status.textContent = 'حسابك غير مسجل في النظام. يرجى التواصل مع الإدارة.';
                  await sb.auth.signOut();
                  return;
                }
                if (profileRow.account_status !== 'active') {
                  status.className = 'auth-status error';
                  status.textContent = 'عضويتك منتهية. يرجى التواصل مع إدارة الموارد البشرية.';
                  await sb.auth.signOut();
                  return;
                }
                const { data: userRoles } = await sb
                  .from('user_roles')
                  .select('role_id,is_active')
                  .eq('user_id', userId)
                  .eq('is_active', true)
                  .limit(1);
                if (userRoles && userRoles.length > 0) {
                  try {
                    await sb.rpc('log_activity', {
                      p_user_id: userId,
                      p_action_type: 'login',
                      p_target_type: 'auth',
                      p_target_id: userId,
                      p_details: null,
                      p_ip_address: null
                    });
                  } catch (logErr) { console.warn('فشل تسجيل نشاط الدخول:', logErr); }
                  status.className = 'auth-status success';
                  status.textContent = 'تم تسجيل الدخول بنجاح! جاري التحويل...';
                  setTimeout(() => {
                    if (redirectParam && redirectParam.includes('dashboard')) location.replace(redirectPath);
                    else if (redirectPath && !redirectPath.includes('dashboard')) location.replace(redirectPath);
                    else location.replace('/admin/dashboard.html');
                  }, 500);
                  return;
                }
                status.className = 'auth-status error';
                status.textContent = 'حسابك غير مرتبط بأي دور نشط. يرجى التواصل مع إدارة الموارد البشرية.';
                await sb.auth.signOut();
                return;
              } catch (roleErr) {
                status.className = 'auth-status error';
                status.textContent = 'حدث خطأ أثناء التحقق من الصلاحيات: ' + translateError(roleErr);
                return;
              }
            }
            status.className = 'auth-status error';
            status.textContent = 'تعذّر تسجيل الدخول. يرجى المحاولة مرة أخرى.';
          } catch (err) {
            status.className = 'auth-status error';
            status.textContent = translateError(err);
          } finally {
            submitBtn.disabled = false;
            submitBtn.style.opacity = 1;
          }
        });
      })();
    </script>
    <script src="../visit-tracker.js" defer></script>
    <script src="../cursor.js" defer></script>
  </body>
</html>
