<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إعادة تعيين كلمة المرور</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js/dist/umd/supabase.min.js"></script>
    <style>
        /* نفس أنماط auth.html */
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="form-section">
            <h2 class="form-title"><i class="fas fa-key"></i> إعادة تعيين كلمة المرور</h2>
            
            <div id="resetAlert" class="alert" style="display:none;"></div>
            
            <form id="resetPasswordForm">
                <div class="form-group">
                    <label for="newPassword">كلمة المرور الجديدة</label>
                    <div class="input-with-icon">
                        <input type="password" id="newPassword" required minlength="6">
                        <i class="fas fa-lock"></i>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="confirmPassword">تأكيد كلمة المرور</label>
                    <div class="input-with-icon">
                        <input type="password" id="confirmPassword" required minlength="6">
                        <i class="fas fa-lock"></i>
                    </div>
                </div>
                
                <button type="submit" class="submit-btn">
                    <i class="fas fa-sync-alt"></i> تعيين كلمة المرور
                </button>
            </form>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://ihawihvbhynxexawjajz.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImloYXdpaHZiaHlueGV4YXdqYWp6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDc4MzgyOTksImV4cCI6MjA2MzQxNDI5OX0.19-qWfJUqv8Y5WYkts36dXsx_kxDBCGbJDBnx2hQUNg';
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        document.getElementById('resetPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const alertBox = document.getElementById('resetAlert');
            
            if(newPassword !== confirmPassword) {
                alertBox.innerHTML = '<i class="fas fa-exclamation-circle"></i> كلمتا المرور غير متطابقتين';
                alertBox.className = 'alert alert-error';
                alertBox.style.display = 'flex';
                return;
            }
            
            const { error } = await supabase.auth.updateUser({
                password: newPassword
            });
            
            if(error) {
                alertBox.innerHTML = `<i class="fas fa-exclamation-circle"></i> ${error.message}`;
                alertBox.className = 'alert alert-error';
                alertBox.style.display = 'flex';
            } else {
                alertBox.innerHTML = '<i class="fas fa-check-circle"></i> تم تحديث كلمة المرور بنجاح!';
                alertBox.className = 'alert alert-success';
                alertBox.style.display = 'flex';
                
                setTimeout(() => {
                    window.location.href = 'auth.html';
                }, 3000);
            }
        });
    </script>
</body>
</html>
