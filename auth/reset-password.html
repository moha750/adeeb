<!doctype html>
<html dir="rtl" lang="ar">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>إعادة تعيين كلمة المرور — نادي أديب</title>
    <meta name="robots" content="noindex, nofollow" />
    <meta name="googlebot" content="noindex, nofollow" />
    <link rel="canonical" href="https://www.adeeb.club/auth/reset-password.html" />
    <!-- favicon.io -->
    <link rel="apple-touch-icon" sizes="152x152" href="/favicon/apple-icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-icon-180x180.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon/android-icon-192x192.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon/favicon-96x96.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon/favicon-16x16.png" />
    <link rel="manifest" href="/favicon/manifest.json" />
    <meta name="msapplication-TileColor" content="#ffffff" />
    <meta name="msapplication-TileImage" content="/favicon/ms-icon-144x144.png" />
    <meta name="theme-color" content="#ffffff" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />
    <link rel="stylesheet" href="../admin/css/fonts.css" />
    <link rel="stylesheet" href="../admin/css/design-tokens.css" />
    <link rel="stylesheet" href="../admin/css/inputs-system.css" />
    <link rel="stylesheet" href="../admin/css/buttons-system.css" />
    <link rel="stylesheet" href="auth-identity.css" />
  </head>
  <body>
    <div class="auth-particles" aria-hidden="true">
      <span></span><span></span><span></span><span></span><span></span>
    </div>

    <div class="auth-card" role="main">
      <header class="auth-head">
        <div class="auth-logo">
          <img alt="شعار نادي أديب" src="https://lh3.googleusercontent.com/d/195w-tUBF_VKwFOm3Sh06fmwnlYzIyw0e" />
        </div>
        <h1>إعادة تعيين كلمة المرور</h1>
        <p>
          <i class="fa-solid fa-envelope-open-text"></i>
          أدخل بريدك الإلكتروني لإرسال رابط إعادة التعيين
        </p>
      </header>

      <div id="status" class="auth-status"></div>

      <form id="resetForm" class="auth-form">
        <div class="form-group">
          <label class="form-label" for="email">
            <span class="label-icon"><i class="fa-solid fa-envelope"></i></span>
            البريد الإلكتروني
          </label>
          <div class="form-input-wrap has-icon-start">
            <span class="form-icon-start"><i class="fa-solid fa-at"></i></span>
            <input id="email" name="email" type="email" inputmode="email" autocomplete="email" required placeholder="name@example.com" class="form-input" />
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-lg btn-block">
          <i class="fa-solid fa-paper-plane"></i> إرسال رابط الإعادة
        </button>
      </form>

      <div class="auth-foot">
        <a href="login.html" class="btn btn-primary btn-outline"><i class="fa-solid fa-arrow-right"></i> العودة لتسجيل الدخول</a>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../supabase-config.js"></script>
    <script>
      (async function() {
        const sb = window.sbClient;
        const status = document.getElementById('status');
        const form = document.getElementById('resetForm');
        const emailInput = document.getElementById('email');

        if (!sb) {
          status.className = 'auth-status error';
          status.textContent = 'Supabase غير مفعّل. تأكد من تحميل المكتبة وإعداد المفاتيح.';
          form.querySelector('button').disabled = true;
          return;
        }

        function setCustomValidationMessage(input) {
          input.addEventListener('invalid', function(e) {
            e.preventDefault();
            if (this.validity.valueMissing) this.setCustomValidity('⚠️ يرجى ملء هذا الحقل');
            else if (this.validity.typeMismatch && this.type === 'email') this.setCustomValidity('⚠️ يرجى إدخال بريد إلكتروني صحيح');
            else this.setCustomValidity('⚠️ يرجى التحقق من البيانات المدخلة');
          });
          input.addEventListener('input', function() { this.setCustomValidity(''); });
        }
        setCustomValidationMessage(emailInput);

        form.addEventListener('submit', async (e) => {
          e.preventDefault();
          status.className = 'auth-status';
          status.textContent = '';
          const email = emailInput.value.trim();
          if (!email) return;
          const submitBtn = form.querySelector('button[type="submit"]');
          submitBtn.disabled = true;
          submitBtn.style.opacity = .7;
          try {
            const { error } = await sb.auth.resetPasswordForEmail(email, {
              redirectTo: `${window.location.origin}/auth/update-password.html`
            });
            if (error) {
              status.className = 'auth-status error';
              if (error.message.includes('rate limit')) status.textContent = 'تم تجاوز عدد المحاولات المسموحة. يرجى الانتظار قليلاً ثم المحاولة مرة أخرى';
              else if (error.message.includes('Invalid email')) status.textContent = 'صيغة البريد الإلكتروني غير صحيحة';
              else status.textContent = 'حدث خطأ: ' + error.message;
              return;
            }
            status.className = 'auth-status success';
            status.textContent = 'تم إرسال رابط إعادة التعيين إلى بريدك الإلكتروني. يرجى التحقق من صندوق الوارد.';
            emailInput.value = '';
          } catch (err) {
            status.className = 'auth-status error';
            status.textContent = 'حدث خطأ غير متوقع: ' + (err.message || err);
          } finally {
            submitBtn.disabled = false;
            submitBtn.style.opacity = 1;
          }
        });
      })();
    </script>
    <script src="../visit-tracker.js" defer></script>
  </body>
</html>
