<!doctype html>
<html dir="rtl" lang="ar">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>تحديث كلمة المرور — نادي أديب</title>
    <meta name="robots" content="noindex, nofollow" />
    <meta name="googlebot" content="noindex, nofollow" />
    <link rel="canonical" href="https://www.adeeb.club/auth/update-password.html" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />
    <link rel="stylesheet" href="../admin/css/fonts.css" />
    <link rel="stylesheet" href="../admin/css/design-tokens.css" />
    <link rel="stylesheet" href="../admin/css/inputs-system.css" />
    <link rel="stylesheet" href="../admin/css/buttons-system.css" />
    <link rel="stylesheet" href="auth-identity.css" />
  </head>
  <body>
    <div class="auth-particles" aria-hidden="true">
      <span></span><span></span><span></span><span></span><span></span>
    </div>

    <div class="auth-card" role="main">
      <header class="auth-head">
        <div class="auth-logo">
          <img alt="شعار نادي أديب" src="https://lh3.googleusercontent.com/d/195w-tUBF_VKwFOm3Sh06fmwnlYzIyw0e" />
        </div>
        <h1>تحديث كلمة المرور</h1>
        <p>
          <i class="fa-solid fa-lock"></i>
          أدخل كلمة المرور الجديدة
        </p>
      </header>

      <div id="status" class="auth-status"></div>

      <form id="updateForm" class="auth-form">
        <div class="form-group">
          <label class="form-label" for="newPassword">
            <span class="label-icon"><i class="fa-solid fa-lock"></i></span>
            كلمة المرور الجديدة
          </label>
          <div class="form-input-wrap has-icon-start has-icon-end">
            <span class="form-icon-start"><i class="fa-solid fa-key"></i></span>
            <input id="newPassword" name="newPassword" type="password" autocomplete="new-password" minlength="6" required placeholder="••••••" class="form-input" />
            <span class="form-icon-end clickable" id="toggleNewPassword" role="button" tabindex="0" aria-label="إظهار/إخفاء كلمة المرور">
              <i class="fa-solid fa-eye-slash"></i>
            </span>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="confirmPassword">
            <span class="label-icon"><i class="fa-solid fa-lock"></i></span>
            تأكيد كلمة المرور
          </label>
          <div class="form-input-wrap has-icon-start has-icon-end">
            <span class="form-icon-start"><i class="fa-solid fa-key"></i></span>
            <input id="confirmPassword" name="confirmPassword" type="password" autocomplete="new-password" minlength="6" required placeholder="••••••" class="form-input" />
            <span class="form-icon-end clickable" id="toggleConfirmPassword" role="button" tabindex="0" aria-label="إظهار/إخفاء كلمة المرور">
              <i class="fa-solid fa-eye-slash"></i>
            </span>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-lg btn-block">
          <i class="fa-solid fa-check"></i> تحديث كلمة المرور
        </button>
      </form>

      <div class="auth-foot">
        <a href="login.html" class="btn btn-primary btn-outline"><i class="fa-solid fa-arrow-right"></i> العودة لتسجيل الدخول</a>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../supabase-config.js"></script>
    <script>
      (async function() {
        const sb = window.sbClient;
        const status = document.getElementById('status');
        const form = document.getElementById('updateForm');
        const newPasswordInput = document.getElementById('newPassword');
        const confirmPasswordInput = document.getElementById('confirmPassword');

        if (!sb) {
          status.className = 'auth-status error';
          status.textContent = 'Supabase غير مفعّل. تأكد من تحميل المكتبة وإعداد المفاتيح.';
          form.querySelector('button').disabled = true;
          return;
        }

        function setCustomValidationMessage(input) {
          input.addEventListener('invalid', function(e) {
            e.preventDefault();
            if (this.validity.valueMissing) this.setCustomValidity('⚠️ يرجى ملء هذا الحقل');
            else if (this.validity.tooShort) this.setCustomValidity(`⚠️ يجب أن يكون ${this.minLength} أحرف على الأقل`);
            else this.setCustomValidity('⚠️ يرجى التحقق من البيانات المدخلة');
          });
          input.addEventListener('input', function() { this.setCustomValidity(''); });
        }
        setCustomValidationMessage(newPasswordInput);
        setCustomValidationMessage(confirmPasswordInput);

        function bindToggle(btnId, inputEl) {
          const btn = document.getElementById(btnId);
          if (!btn) return;
          function toggle() {
            const type = inputEl.type === 'password' ? 'text' : 'password';
            inputEl.type = type;
            const icon = btn.querySelector('i');
            icon.classList.toggle('fa-eye-slash', type === 'password');
            icon.classList.toggle('fa-eye', type === 'text');
          }
          btn.addEventListener('click', toggle);
          btn.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggle(); }
          });
        }
        bindToggle('toggleNewPassword', newPasswordInput);
        bindToggle('toggleConfirmPassword', confirmPasswordInput);

        form.addEventListener('submit', async (e) => {
          e.preventDefault();
          status.className = 'auth-status';
          status.textContent = '';
          const newPassword = newPasswordInput.value;
          const confirmPassword = confirmPasswordInput.value;
          if (!newPassword || !confirmPassword) return;
          if (newPassword !== confirmPassword) {
            status.className = 'auth-status error';
            status.textContent = 'كلمتا المرور غير متطابقتين';
            return;
          }
          if (newPassword.length < 6) {
            status.className = 'auth-status error';
            status.textContent = 'كلمة المرور يجب أن تكون 6 أحرف على الأقل';
            return;
          }
          const submitBtn = form.querySelector('button[type="submit"]');
          submitBtn.disabled = true;
          submitBtn.style.opacity = .7;
          try {
            const { error } = await sb.auth.updateUser({ password: newPassword });
            if (error) {
              status.className = 'auth-status error';
              if (error.message.includes('Same password')) status.textContent = 'كلمة المرور الجديدة يجب أن تكون مختلفة عن القديمة';
              else if (error.message.includes('Password should be at least')) status.textContent = 'كلمة المرور يجب أن تكون 6 أحرف على الأقل';
              else status.textContent = 'حدث خطأ: ' + error.message;
              return;
            }
            status.className = 'auth-status success';
            status.textContent = 'تم تحديث كلمة المرور بنجاح! جاري التحويل لتسجيل الدخول...';
            setTimeout(() => { window.location.href = 'login.html'; }, 2000);
          } catch (err) {
            status.className = 'auth-status error';
            status.textContent = 'حدث خطأ غير متوقع: ' + (err.message || err);
          } finally {
            submitBtn.disabled = false;
            submitBtn.style.opacity = 1;
          }
        });

        try {
          const { data: { session } } = await sb.auth.getSession();
          if (!session) {
            status.className = 'auth-status error';
            status.textContent = 'الرابط غير صالح أو منتهي الصلاحية. يرجى طلب رابط جديد.';
            form.querySelector('button[type="submit"]').disabled = true;
          }
        } catch (err) {
          status.className = 'auth-status error';
          status.textContent = 'حدث خطأ في التحقق من الجلسة';
        }
      })();
    </script>
  </body>
</html>
