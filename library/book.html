<!DOCTYPE html>
<html lang="ar" dir="rtl">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>التقارير السنوية — مكتبة أدِيب</title>
    <meta name="author" content="نادي أدِيب — جامعة الملك فيصل">
    <meta name="theme-color" content="#274060">
    <meta property="og:site_name" content="نادي أدِيب">
    <meta property="og:type" content="website">
    <meta property="og:locale" content="ar_SA">
    <meta property="og:title" content="التقارير السنوية — مكتبة أدِيب">
    <meta property="og:description" content="تصفّح التقارير السنوية لنادي أدِيب بتجربة تقليب تفاعلية.">
    <meta property="og:image" content="https://www.adeeb.club/Mid-termReport/midTerm-Thumbnail.png">
    <meta property="og:image:alt" content="مكتبة أدِيب — التقارير السنوية">
    <meta property="og:image:secure_url" content="https://www.adeeb.club/Mid-termReport/midTerm-Thumbnail.png">
    <meta property="og:image:type" content="image/png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:site" content="@AB_KFU">
    <meta name="twitter:title" content="التقارير السنوية — مكتبة أدِيب">
    <meta name="twitter:image" content="https://www.adeeb.club/Mid-termReport/midTerm-Thumbnail.png">
    <link rel="apple-touch-icon" sizes="152x152" href="/favicon/apple-icon-152x152.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-icon-180x180.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon/favicon-16x16.png">
    <link rel="manifest" href="/favicon/manifest.json">
    <link rel="stylesheet" href="https://public.codepenassets.com/css/normalize-5.0.0.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="assets/viewer.css">
  </head>

  <body class="loading">

    <!-- شاشة التحميل -->
    <div class="loading-screen" id="loadingScreen">
      <div class="loading-content">
        <div class="loading-spinner"></div>
        <p>لحظات، ريشتنا قيد التحميل ...</p>
      </div>
    </div>

    <!-- شريط العنوان -->
    <div class="header-bar">
      <a class="back-to-library" href="index.html" title="العودة إلى المكتبة">
        <i class="fas fa-arrow-right"></i>
        <span>المكتبة</span>
      </a>
      <div class="header-text">
        <h1 class="report-title"><!-- يُملأ ديناميكياً من بيانات التقرير --></h1>
      </div>
    </div>

    <!-- القائمة الجانبية للصفحات -->
    <div class="pages-sidebar" id="pagesSidebar">
      <div class="sidebar-header">
        <h2>الصفحات</h2>
        <button class="close-sidebar-btn" id="closeSidebarBtn">
          <i class="fas fa-times"></i>
        </button>
      </div>
      <div class="pages-grid" id="pagesGrid">
        <!-- تُضاف الصفحات ديناميكياً -->
      </div>
    </div>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- حاوية الكتيب وأزرار التنقل -->
    <div class="flipbook-container">
      <div id="flipbook">
        <!-- تُبنى صفحات الكتيب ديناميكياً من reports.json -->
      </div>

      <!-- أزرار التنقل مع العداد -->
      <div class="navigation-controls">

        <!-- صف التنقل: السابق + العدّاد + التالي -->
        <div class="ctrl-group ctrl-nav">
          <button class="nav-btn prev-btn" id="prevBtn" title="الصفحة السابقة">
            <i class="fas fa-chevron-right"></i>
          </button>
          <div class="nav-page-counter">
            <span class="current">1</span>
            <span class="separator">/</span>
            <span class="total">0</span>
          </div>
          <button class="nav-btn next-btn" id="nextBtn" title="الصفحة التالية">
            <i class="fas fa-chevron-left"></i>
          </button>
        </div>

        <!-- صف الأدوات: الصفحات + الصوت + ملء الشاشة (مع نصوص) -->
        <div class="ctrl-group ctrl-utils">
          <div class="ctrl-item">
            <button class="pages-toggle-btn" id="pagesMenuBtn" title="عرض كل الصفحات">
              <i class="fa-solid fa-table-cells-large"></i>
            </button>
            <span class="ctrl-label">الصفحات</span>
          </div>
          <div class="ctrl-item">
            <button class="sound-toggle-btn" id="soundToggleBtn" title="تفعيل/إيقاف الصوت">
              <i class="fas fa-volume-up"></i>
            </button>
            <span class="ctrl-label">الصوت</span>
          </div>
          <div class="ctrl-item">
            <button class="fullscreen-btn" id="fullscreenBtn" title="ملء الشاشة">
              <i class="fas fa-expand"></i>
            </button>
            <span class="ctrl-label">ملء الشاشة</span>
          </div>
        </div>
      </div>

      <!-- قسم المشاركة -->
      <div class="article-share" id="shareSection">
        <h3>شارك هذا التقرير</h3>
        <div class="share-buttons">
          <button class="share-btn x" id="shareX" title="شارك على X">
            <i class="fa-brands fa-x-twitter"></i>
            أكس
          </button>
          <button class="share-btn telegram" id="shareTelegram" title="شارك على تيليجرام">
            <i class="fab fa-telegram"></i>
            تيليجرام
          </button>
          <button class="share-btn whatsapp" id="shareWhatsapp" title="شارك على واتساب">
            <i class="fab fa-whatsapp"></i>
            واتساب
          </button>
          <button class="share-btn copy" id="copyLink" title="انسخ الرابط">
            <i class="fas fa-link"></i>
            <span>نسخ الرابط</span>
          </button>
        </div>
        <div id="shareToast" class="share-toast">
          <i class="fas fa-check-circle"></i>
          <span id="shareToastMessage">تم النسخ بنجاح!</span>
        </div>
      </div>
    </div>

    <!-- الفوتر -->
    <footer class="footer">
      <div class="footer-content">
        <div class="footer-bottom">
          <div class="footer-divider"></div>
          <p class="footer-copyright">
            جميع الحقوق محفوظة لنادي أدِيب <span class="year"></span> ©
          </p>
        </div>
      </div>
    </footer>

    <script src='https://cdnjs.cloudflare.com/ajax/libs/jquery/3.3.1/jquery.min.js'></script>
    <script src='https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/js/all.min.js'></script>
    <script src="assets/viewer.js"></script>
    <script src="../visit-tracker.js" defer></script>

  </body>

</html>
