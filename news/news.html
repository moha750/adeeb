<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قراءة الخبر | نادي أدِيب</title>
    <link rel="stylesheet" href="news.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" href="https://lh3.googleusercontent.com/d/195w-tUBF_VKwFOm3Sh06fmwnlYzIyw0e" type="image/png">
        <!-- Supabase JS -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js/dist/umd/supabase.min.js"></script>
</head>

<div id="loadingOverlay" class="loading-overlay">
    <div class="loading-spinner">
        <i class="fas fa-spinner fa-spin"></i>
        <span>جاري التحميل...</span>
    </div>
</div>

<body>
    <!------------------------------ Header Section ------------------------------>
    <header class="header">
        <div class="header-container">
            <div class="menu-toggle" id="menuToggle">
                <div class="hamburger">
                    <span class="line line1"></span>
                    <span class="line line2"></span>
                    <span class="line line3"></span>
                </div>
            </div>
            <div class="logo">
                <a class="logo-link" href="#">
                    <img alt="شعار نادي أديب" class="logo-img"
                        src="https://lh3.googleusercontent.com/d/195w-tUBF_VKwFOm3Sh06fmwnlYzIyw0e" />
                </a>
            </div>
            <nav class="nav">
                <ul class="nav-links">
                    <li class="nav-item">
                        <a class="nav-link active" href="#adeebbook">
                            <i class="fas fa-home nav-icon"></i>
                            <span class="nav-text">الرئيسية</span>
                            <span class="nav-wave"></span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#our-works">
                            <i class="fa-solid fa-briefcase"></i>
                            <span class="nav-text">أعمالنا</span>
                            <span class="nav-wave"></span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#achievements">
                            <i class="fa-solid fa-trophy"></i>
                            <span class="nav-text">انجازتنا</span>
                            <span class="nav-wave"></span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#sponsors">
                            <i class="fa-solid fa-handshake"></i>
                            <span class="nav-text">شركائنا</span>
                            <span class="nav-wave"></span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#contact">
                            <i class="fas fa-envelope nav-icon"></i>
                            <span class="nav-text">تواصل معنا</span>
                            <span class="nav-wave"></span>
                        </a>
                    </li>
                </ul>
                <!-- زر الاشتراك -->
                <a class="subscribe-btn" href="admin/admin.html">
                    <span>تسجيل الدخول</span>
                    <i class="fas fa-cog"></i>
                </a>
            </nav>
        </div>
    </header>

    <main class="news-page">
        <article class="news-article" id="newsArticle">
            <!-- سيتم ملء محتوى الخبر هنا عبر JavaScript -->
        </article>

        <!-- قسم التعليقات والتقييمات -->
        <section class="comments-section" id="commentsSection" style="display:none;">
            <div class="section-header">
                <h2><span>تفاعل</span> القراء</h2>
                <p>شاركنا رأيك في هذا الخبر</p>
            </div>

<div class="ratings-container">
    <h3>تقييم الخبر</h3>
    
    <!-- قسم عرض التقييم (للقراءة فقط) -->
    <div class="rating-display">
        <div class="stars-display" id="starsDisplay">
            <!-- النجوم المعروضة -->
            <span>☆</span><span>☆</span><span>☆</span><span>☆</span><span>☆</span>
        </div>
        <p class="average-rating">التقييم العام: <span id="avgRating">0</span> من 5 (<span id="ratingsCount">0</span> تقييمات)</p>
    </div>
    
    <!-- قسم تقييم الخبر (للتفاعل) -->
    <div class="rating-input" id="ratingInput">
        <p class="rating-text">قيم هذا الخبر:</p>
        <div class="rating-stars">
            <span data-value="1" title="سيء">☆</span>
            <span data-value="2" title="غير جيد">☆</span>
            <span data-value="3" title="متوسط">☆</span>
            <span data-value="4" title="جيد">☆</span>
            <span data-value="5" title="ممتاز">☆</span>
        </div>
        <p class="rating-message" id="ratingMessage"></p>
    </div>
</div>

            <div class="comments-container">
                <h3>التعليقات <span id="commentsCount">(0)</span></h3>

                <form id="commentForm" class="comment-form">
                    <input type="text" id="commentName" placeholder="اسمك" required>
                    <textarea id="commentText" placeholder="اكتب تعليقك هنا..." required></textarea>
                    <button type="submit" class="submit-btn">
                        <span>إرسال التعليق</span>
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </form>

                <div id="commentsList" class="comments-list">
                    <!-- التعليقات تظهر هنا -->
                </div>
            </div>
        </section>
    </main>


    <!-- ملفات JavaScript الخاصة بنا -->
    <script src="news.js"></script>
</body>

</html>
